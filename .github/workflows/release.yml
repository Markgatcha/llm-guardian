name: Release

# Publishes to npm automatically whenever a GitHub Release is published.
# Requires a repository secret NPM_TOKEN (npm automation token with publish rights).
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-npm:
    name: Publish llm-guardian to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        # Produces dist/guardian.js consumed by the `bin` entry.
        run: bun run build
      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Publish
        # --ignore-scripts: the bun build above already produced dist/.
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
