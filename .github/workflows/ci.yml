name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # — Backend ————————————————————————————————————————
  backend-lint:
    name: Backend – Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # Install project + dev extras so mypy can resolve all imports.
      - run: pip install -e ".[dev]"
      - run: ruff check backend tests/backend
      - run: mypy backend --ignore-missing-imports

  backend-test:
    name: Backend – Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack:latest
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run pytest
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          REDIS_URL: "redis://localhost:6379/0"
          APP_ENV: "testing"
          GUARDIAN_API_KEY: "ci-test-key"
          SECRET_KEY: "ci-test-secret-key-32-chars-xxxx"
        run: pytest tests/backend -v --tb=short

  # — Frontend ————————————————————————————————————————
  frontend-lint:
    name: Frontend – Lint & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run type-check

  frontend-test:
    name: Frontend – Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm test -- --run

  # — Core Engine (Bun/TypeScript) ————————————————————
  core-test:
    name: Core – Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
        working-directory: src
      - run: bun run lint
        working-directory: src
      - run: bun run typecheck
        working-directory: src

  # — Dashboard (Vite/Bun) ————————————————————————————
  dashboard-test:
    name: Dashboard – Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
        working-directory: src/dashboard
      - run: bun run lint
        working-directory: src/dashboard
      - run: bun run build
        working-directory: src/dashboard

  # — Docker ——————————————————————————————————————————
  docker-build:
    name: Docker – Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker buildx build --platform linux/amd64 --no-cache -t llm-guardian:ci .
