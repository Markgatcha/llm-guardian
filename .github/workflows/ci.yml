name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend – Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # Install project + dev extras so mypy can resolve all imports.
      - run: pip install -e ".[dev]"
      - run: ruff check backend tests/backend
      - run: mypy backend --ignore-missing-imports

  backend-test:
    name: Backend – Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack:latest
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run pytest
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          REDIS_URL: "redis://localhost:6379/0"
          APP_ENV: "testing"
          GUARDIAN_API_KEY: "ci-test-key"
          SECRET_KEY: "ci-test-secret-key-32-chars-xxxx"
        run: pytest tests/backend -v --tb=short

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend – Lint & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  frontend-test:
    name: Frontend – Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --run

  # ── Docker build smoke-test ────────────────────────────────────────────────
  docker-build:
    name: Docker – Build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: llm-guardian:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Validate config YAML ───────────────────────────────────────────────────
  config-yaml:
    name: Config – YAML parse check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Parse config.example.yaml
        run: python -c "import yaml, sys; yaml.safe_load(open('config.example.yaml'))" && echo "✅ config.example.yaml is valid YAML"
