services:
  # ── Backend API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guardian-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////data/guardian.db"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - guardian-data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Redis Stack (cache + streams) ────────────────────────────────────────
  redis:
    image: redis/redis-stack:latest
    container_name: guardian-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001"      # RedisInsight UI → http://localhost:8001
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend (Vite dev server with hot-reload) ────────────────────────────
  # The Vite proxy forwards /api requests to the api service inside the
  # Docker network (http://api:8000).  Your browser still reaches the
  # frontend at http://localhost:5173 and the API at http://localhost:8000.
  frontend:
    image: node:20-alpine
    container_name: guardian-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Used by vite.config.ts as the server-side proxy target.
      # Must use the Docker service name, not localhost.
      VITE_API_URL: "http://api:8000"
    depends_on:
      - api

volumes:
  guardian-data:
  redis-data:
